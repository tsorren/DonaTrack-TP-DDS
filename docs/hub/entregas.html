<!DOCTYPE html>
<html lang="es">
  <head>
    <title>Entregas de Arquitectura - DonaTrack</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="viewer-container">
      <!-- Barra lateral donde la lista se poblará dinámicamente -->
      <div class="sidebar">
        <h2>Documentos (PDFs)</h2>
        <a href="index.html" class="btn btn-primary btn-sm btn-block mb-4">Volver al Hub</a>
        <div id="pdf-list">
          <p>Cargando entregas...</p>
        </div>
      </div>
      <!-- Visualizador del documento -->
      <div class="pdf-viewer">
          <iframe id="pdf-frame" src="" width="100%" height="100%" frameborder="0" title="Visor de PDF"></iframe>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
