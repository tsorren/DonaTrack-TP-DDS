name: DonaTrack Unified Pipeline

on:
  pull_request:
    branches:
      - main
      - 'ENTREGA_*'

jobs:
  validate-git-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Validar nomenclatura de ramas
        run: |
          BASE_BRANCH="${{ github.base_ref }}"
          SRC_BRANCH="${{ github.head_ref }}"

          # Caso 1: Merge a main (Debe venir de una rama de entrega parcial) [cite: 34]
          if [[ "$BASE_BRANCH" == "main" ]]; then
            if [[ ! "$SRC_BRANCH" =~ ^ENTREGA_.* ]]; then
              [cite_start]echo "Error: Pull Requests a 'main' solo se permiten desde 'ENTREGA_*'." [cite: 31]
              exit 1
            fi
          fi

          # Caso 2: Merge a ENTREGA_n (Debe venir de En_...) [cite: 37, 39]
          if [[ "$BASE_BRANCH" =~ ^ENTREGA_([0-9]+)$ ]]; then
            # Extrae el numero de entrega (ej: 1 de ENTREGA_1)
            DELIVERY_NUM="${BASH_REMATCH[1]}"
            REQUIRED_PREFIX="E${DELIVERY_NUM}_"
            
            if [[ ! "$SRC_BRANCH" =~ ^$REQUIRED_PREFIX.* ]]; then
              [cite_start]echo "Error: Pull Requests hacia '$BASE_BRANCH' deben iniciar con '$REQUIRED_PREFIX'." [cite: 39]
              echo "Ejemplo: ${REQUIRED_PREFIX}nombre-del-requerimiento"
              exit 1
            fi
          fi

  static-analysis-and-design:
    needs: validate-git-flow
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verificar Formato (Spotless)
        run: mvn spotless:check

      - name: Instalar Dependencias de Python
        run: pip install -q -U google-generativeai

      - name: Generar y Auditar Diagramas (IA)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mvn plantuml-generator:generate
          python3 .github/scripts/compare_diagrams.py

  build-test-and-sonar:
    needs: static-analysis-and-design
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Requerido por SonarCloud para el analisis de lineas

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar Tests y Analisis de SonarCloud
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          # Se ejecutan los tests primero para generar los reportes de JaCoCo
          # Luego se envia el analisis a SonarCloud incluyendo la ruta de cobertura
          mvn clean verify sonar:sonar \
            -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
            -Dsonar.organization=${{ secrets.SONAR_ORG }} \
            -Dsonar.host.url=${{ secrets.SONAR_URL }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=**/target/site/jacoco/jacoco.xml

      - name: Subir reportes de calidad (Artifacts)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-calidad
          path: |
            **/target/site/jacoco/
            **/target/surefire-reports/

      - name: Verificar Construccion de Docker
        run: |
          docker build -t donaciones-test -f donaciones-service/Dockerfile .
          docker build -t notificaciones-test -f notificaciones-service/Dockerfile .