name: Deploy GitHub Pages (Hub, Documentador, Preview, Entregas)

on:
  push:
    branches:
      - main
      - 'ENTREGA_*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Prepare Deployment Folders
        run: |
          # Crear estructura base
          mkdir -p staging/documentador
          mkdir -p staging/adr-preview
          mkdir -p staging/docs/entregas
          
          # Archivo para evitar que GitHub Pages ignore carpetas que empiezan con _ (Jekyll)
          touch staging/.nojekyll
          
          # Copiar Documentador
          if [ -d "docs/documentador" ]; then
            cp -a docs/documentador/. staging/documentador/
          fi
          
          # Copiar Hub a la raíz de staging
          if [ -d "docs/hub" ]; then
            cp -a docs/hub/. staging/
          fi
          
          # Copiar archivos de entregas para que el visor de PDFs los consuma
          if [ -d "docs/entregas" ]; then
            cp -a docs/entregas/. staging/docs/entregas/
          fi
          
          # Generar el árbol de directorio JSON de PDFs usando el script dedicado
          if [ -f ".github/scripts/generate-pdf-tree.js" ]; then
            node .github/scripts/generate-pdf-tree.js
          else
            echo "Script generate-pdf-tree.js no encontrado."
          fi

      - name: Build Log4brains (Preview)
        run: |
          # Construimos usando npx para usar siempre la última versión sin ensuciar el global
          npx --yes log4brains build --basePath /${GITHUB_REPOSITORY#*/}/adr-preview
          
          # Copiamos el build (incluyendo archivos ocultos) a la carpeta adr-preview
          if [ -d ".log4brains/out" ]; then
            cp -a .log4brains/out/. staging/adr-preview/
          else
            echo "Error: el build de Log4brains falló, no existe .log4brains/out"
            exit 1
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: staging
          branch: gh-pages
          clean: true